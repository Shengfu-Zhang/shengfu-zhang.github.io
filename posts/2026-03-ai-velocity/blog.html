<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading… — Shengfu Zhang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <style>
    :root {
      --bg:         #0e0e0e;
      --surface:    #161616;
      --surface2:   #1c1c1c;
      --border:     #262626;
      --muted:      #686868;
      --body:       #c0c0c0;
      --heading:    #efefef;
      --accent:     #c8f060;
      --accent2:    #60c8f0;
      --font-serif: 'DM Serif Display', Georgia, serif;
      --font-sans:  'DM Sans', system-ui, sans-serif;
      --font-mono:  'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--body);
      font-family: var(--font-sans);
      font-weight: 400;
      line-height: 1.75;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle radial glow background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 15% 30%, rgba(200,240,96,.04) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 85% 70%, rgba(96,200,240,.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .wrap {
      position: relative;
      z-index: 1;
      max-width: 700px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
    }

    /* ── Back nav ── */
    .back-nav {
      padding: 2rem 0 2.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .back-link {
      font-family: var(--font-mono);
      font-size: .75rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      transition: color .2s;
    }

    .back-link:hover { color: var(--accent); }
    .back-link .arrow { font-style: normal; }

    .back-site {
      font-family: var(--font-mono);
      font-size: .72rem;
      color: var(--border);
      letter-spacing: .04em;
    }

    /* ── Post meta ── */
    .post-meta {
      padding: 3rem 0 0;
      animation: fadeUp .5s ease both;
    }

    .post-date {
      font-family: var(--font-mono);
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .post-title {
      font-family: var(--font-serif);
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      color: var(--heading);
      line-height: 1.15;
      letter-spacing: -.01em;
    }

    .post-byline {
      margin-top: 1.2rem;
      font-size: .88rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: .8rem;
    }

    .post-byline .author { color: var(--body); font-weight: 500; }

    .post-tags {
      display: flex;
      gap: .4rem;
      margin-top: 1.2rem;
      flex-wrap: wrap;
    }

    .tag {
      font-family: var(--font-mono);
      font-size: .65rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: .2rem .55rem;
      border-radius: 2px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    /* ── Article body ── */
    .article-body {
      margin-top: 3rem;
      padding-top: 3rem;
      border-top: 1px solid var(--border);
      animation: fadeUp .6s ease .1s both;
    }

    /* Typography */
    .article-body p {
      margin-bottom: 1.5em;
      font-size: 1.05rem;
      line-height: 1.8;
      color: var(--body);
    }

    .article-body h1,
    .article-body h2,
    .article-body h3 {
      font-family: var(--font-serif);
      color: var(--heading);
      margin: 2.4em 0 .8em;
      line-height: 1.2;
      letter-spacing: -.01em;
    }

    .article-body h1 { font-size: 2rem; }
    .article-body h2 { font-size: 1.5rem; }
    .article-body h3 { font-size: 1.2rem; }

    .article-body h2::before {
      content: '//';
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: .8em;
      margin-right: .6em;
      opacity: .7;
    }

    .article-body strong {
      color: var(--heading);
      font-weight: 500;
    }

    .article-body em {
      color: var(--body);
      font-style: italic;
    }

    .article-body a {
      color: var(--accent2);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color .2s;
    }
    .article-body a:hover { border-color: var(--accent2); }

    .article-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5em 0;
    }

    /* Blockquote */
    .article-body blockquote {
      border-left: 3px solid var(--accent);
      padding: .8rem 1.4rem;
      margin: 2em 0;
      background: var(--surface);
      color: var(--body);
      font-style: italic;
    }

    .article-body blockquote p { margin: 0; }

    /* Lists */
    .article-body ul,
    .article-body ol {
      padding-left: 1.6em;
      margin-bottom: 1.5em;
    }

    .article-body li {
      margin-bottom: .4em;
      font-size: 1.05rem;
      line-height: 1.75;
    }

    /* Inline code */
    .article-body :not(pre) > code {
      font-family: var(--font-mono);
      font-size: .88em;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: .1em .4em;
      border-radius: 3px;
      color: var(--accent);
    }

    /* Code blocks */
    .article-body pre {
      background: var(--surface) !important;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.2rem 1.4rem;
      overflow-x: auto;
      margin: 1.8em 0;
      font-size: .88rem;
      line-height: 1.6;
    }

    .article-body pre code {
      background: none !important;
      border: none !important;
      padding: 0 !important;
      font-family: var(--font-mono) !important;
      color: var(--body);
    }

    /* Mermaid diagrams */
    .article-body .mermaid {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.5rem;
      margin: 2em 0;
      text-align: center;
      overflow-x: auto;
    }

    /* ── Footer ── */
    .article-footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .back-bottom {
      font-family: var(--font-mono);
      font-size: .75rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
    }
    .back-bottom:hover { color: var(--accent); }

    .article-footer-right {
      font-family: var(--font-mono);
      font-size: .72rem;
      color: var(--muted);
    }

    /* Loading state */
    #loading {
      padding: 4rem 0;
      font-family: var(--font-mono);
      font-size: .8rem;
      color: var(--muted);
      letter-spacing: .08em;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 500px) {
      .wrap { padding: 0 1.2rem 4rem; }
      .back-site { display: none; }
      .post-title { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Back nav -->
  <nav class="back-nav">
    <a class="back-link" href="../../">
      <span class="arrow">←</span> Shengfu Zhang
    </a>
    <span class="back-site">shengfu-zhang.github.io/shengfu-blog</span>
  </nav>

  <!-- Post meta (filled by JS) -->
  <div class="post-meta" id="post-meta" style="display:none">
    <div class="post-date" id="post-date"></div>
    <h1 class="post-title" id="post-title"></h1>
    <div class="post-byline">
      <span class="author">Shengfu Zhang</span>
      <span>·</span>
      <span id="read-time"></span>
    </div>
    <div class="post-tags" id="post-tags"></div>
  </div>

  <!-- Article content -->
  <div id="loading">Loading…</div>
  <article class="article-body" id="article" style="display:none"></article>

  <!-- Footer -->
  <footer class="article-footer" id="article-footer" style="display:none">
    <a class="back-bottom" href="../../">← All posts</a>
    <span class="article-footer-right">Shengfu Zhang · 2026</span>
  </footer>

</div>

<script>
  // Config — edit per post
  const POST = {
    title: 'We Sped Up the Wrong Part',
    date:  'March 2026',
    tags:  ['AI', 'Engineering', 'Productivity'],
  };

  // Init mermaid with dark theme
  mermaid.initialize({
    startOnLoad: false,
    theme: 'dark',
    themeVariables: {
      background: '#161616',
      primaryColor: '#262626',
      primaryTextColor: '#c0c0c0',
      lineColor: '#686868',
      edgeLabelBackground: '#161616',
    }
  });

  // Configure marked
  marked.setOptions({
    breaks: true,
    gfm: true,
  });

  // Custom renderer — intercept mermaid code blocks
  const renderer = new marked.Renderer();
  renderer.code = function(token) {
    const lang = (token.lang || '').trim();
    if (lang === 'mermaid') {
      return `<div class="mermaid">${token.text}</div>`;
    }
    const highlighted = lang && hljs.getLanguage(lang)
      ? hljs.highlight(token.text, { language: lang }).value
      : hljs.highlightAuto(token.text).value;
    return `<pre><code class="hljs language-${lang}">${highlighted}</code></pre>`;
  };
  marked.use({ renderer });

  // Estimate read time
  function readTime(text) {
    const words = text.trim().split(/\s+/).length;
    const mins = Math.max(1, Math.round(words / 200));
    return `${mins} min read`;
  }

  // Strip H1 from body (we display it separately)
  function stripTitle(md) {
    return md.replace(/^#\s+.+\n?(\n)?/m, '').trim();
  }

  // Fill meta
  function fillMeta(rawMd) {
    document.title = POST.title + ' — Shengfu Zhang';
    document.getElementById('post-date').textContent = POST.date;
    document.getElementById('post-title').textContent = POST.title;
    document.getElementById('read-time').textContent = readTime(rawMd);

    const tagsEl = document.getElementById('post-tags');
    POST.tags.forEach(t => {
      const s = document.createElement('span');
      s.className = 'tag';
      s.textContent = t;
      tagsEl.appendChild(s);
    });

    document.getElementById('post-meta').style.display = '';
  }

  async function loadPost() {
    try {
      const res = await fetch('./blog.md');
      if (!res.ok) throw new Error(res.status);
      const md = await res.text();

      fillMeta(md);

      const body = stripTitle(md);
      document.getElementById('article').innerHTML = marked.parse(body);
      document.getElementById('article').style.display = '';
      document.getElementById('article-footer').style.display = '';
      document.getElementById('loading').style.display = 'none';

      // Run mermaid on any diagrams
      await mermaid.run({ nodes: document.querySelectorAll('.mermaid') });

    } catch (e) {
      document.getElementById('loading').textContent = 'Failed to load post.';
      console.error(e);
    }
  }

  loadPost();
</script>
</body>
</html>
